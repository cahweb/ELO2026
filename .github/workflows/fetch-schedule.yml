name: Sync schedule from STARS

on:
  schedule:
    - cron: "23 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-schedule
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run parser tests against fixtures
        run: python -m unittest tests.test_fetch_schedule -v

      - name: Fetch live schedule
        run: python scripts/fetch_schedule.py

      - name: Commit if changed
        run: |
          git add data/events.json
          if git diff --cached --quiet; then
            echo "Schedule unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync schedule from STARS"
          git push
